# Schueler-Tutor — Docker-Stack
# PostgreSQL ist als Service Teil dieses Stacks (keine externe DB-Instanz).
# Start:  docker compose up -d
# Logs:   docker compose logs -f backend

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Kein Port-Mapping nach außen — DB ist nur intern im Compose-Netzwerk erreichbar.

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Backend spricht die DB über den Service-Namen "db" an.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - chat_uploads:/data/chat_uploads   # Phase 2.1: Chat-Anhänge
      - backups:/backups                  # täglicher pg_dump
    expose:
      - "8000"                            # nur intern; nginx proxyt /api/* hierher

  frontend:
    build: ./frontend
    restart: unless-stopped
    # Vite-Build liefert statische Dateien; werden von nginx ausgeliefert.
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Let's-Encrypt-Zertifikate (Produktion) bei Bedarf hier mounten:
      # - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  pgdata:
  chat_uploads:
  backups:
